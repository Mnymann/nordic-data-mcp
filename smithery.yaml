# Smithery.ai registry configuration for nordic-data-mcp.
#
# This server is hosted by us (AddonNordic ApS) on Railway — Smithery
# does NOT need to deploy it. The registry just routes users to our
# authenticated endpoint and collects their API key via the standard
# config UI.
#
# Public URL (Bearer-auth, billed per tenant):
#   https://nordic-data-mcp-production.up.railway.app/mcp/auth
#
# Public URL (no-auth, for Anthropic Connectors Directory review only —
# not advertised in Smithery):
#   https://nordic-data-mcp-production.up.railway.app/mcp

displayName: "Nordic Data"
description: >
  Authoritative company, VAT, sanctions, KYB, address, and LEI data for 15
  European countries (DK, NO, SE, FI, IE, UK, FR, DE, CZ, PL, LV, EE, NL, BE, LU)
  — exposed to AI agents (Claude, Cursor, ChatGPT, Codex) as 7 MCP tools.
  NL and DE require a Starter+ subscription (free-tier keys receive HTTP 402);
  NL=5x, DE=3x quota cost on paid tiers, all others 1x.
  Backed by official registries (Erhvervsstyrelsen, Brønnøysund, Bolagsverket,
  PRH, CRO, Companies House, INSEE, Handelsregister, ARES, KRS, UR, RIK),
  VIES + HMRC for VAT, OpenSanctions for UN/EU/OFAC/PEP screening, GLEIF
  for LEI, and DAWA / Kartverket / BAN / MML / Nominatim for addresses. Get
  a free API key (100 lookups/day) at https://addonnordic.com.

startCommand:
  type: http
  configSchema:
    type: object
    required:
      - apiKey
    properties:
      apiKey:
        type: string
        title: "Nordic Data API key"
        description: >
          Your personal API key. Get one at https://addonnordic.com — free
          tier (100 lookups/day) up to Enterprise (200,000/day). The key
          starts with "ndk_" and is forwarded to our backend as a Bearer
          token so usage is tracked against your account.
        pattern: "^ndk_[A-Za-z0-9_-]{16,}$"
        minLength: 20
      defaultCountry:
        type: string
        title: "Default country (optional)"
        description: >
          ISO 3166-1 alpha-2 country code (lowercase) to assume when a tool
          call omits the `country` argument. Leave empty to require the
          country on every call (recommended for most users). Useful when you
          mostly work in a single market — e.g. set "dk" to skip repeating
          it on every lookup.
        enum: ["dk", "no", "se", "fi", "ie", "uk", "fr", "de", "cz", "pl", "lv", "ee", "nl", "be", "lu"]
      verboseErrors:
        type: boolean
        title: "Verbose errors (optional)"
        description: >
          When true, include upstream HTTP status and request-id details in
          error messages returned to the agent. Helpful when debugging
          integrations; leave off in production.
        default: false

exampleConfig:
  apiKey: "ndk_replace_with_your_actual_key_from_addonnordic_dashboard"
  defaultCountry: "dk"
  verboseErrors: false
